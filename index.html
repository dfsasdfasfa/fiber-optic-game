<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>光纤通信 · 三关闯战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a4e 30%, #2d1b69 60%, #0f0c29 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 780px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(120, 100, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            margin-top: 10px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .top-bar h1 {
            font-size: 20px;
            background: linear-gradient(135deg, #a78bfa, #7dd3fc, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .top-stats {
            display: flex;
            gap: 14px;
            font-size: 14px;
            background: rgba(15, 10, 40, 0.7);
            padding: 7px 16px;
            border-radius: 40px;
            border: 1px solid rgba(120, 100, 255, 0.2);
        }

        .top-stats .score span {
            color: #fbbf24;
            font-weight: 700;
        }

        .top-stats .lives span {
            color: #f87171;
            font-weight: 700;
        }

        .top-stats .level-info {
            color: #a5b4fc;
        }

        .top-stats .level-info span {
            color: #c084fc;
            font-weight: 700;
        }

        /* Level Progress */
        .level-progress {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }

        .level-dot {
            flex: 1;
            height: 6px;
            border-radius: 10px;
            background: rgba(100, 80, 180, 0.2);
            transition: all 0.4s ease;
        }

        .level-dot.done {
            background: linear-gradient(90deg, #34d399, #6ee7b7);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
        }

        .level-dot.active {
            background: linear-gradient(90deg, #a78bfa, #c084fc);
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.5);
        }

        .level-dot.locked {
            background: rgba(100, 80, 180, 0.2);
        }

        /* Play Area */
        .play-area {
            background: rgba(10, 8, 30, 0.6);
            border-radius: 24px;
            padding: 24px 18px 28px;
            min-height: 400px;
            border: 1px solid rgba(120, 100, 255, 0.08);
        }

        .mode-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(88, 60, 180, 0.5), rgba(60, 40, 140, 0.5));
            color: #c4b5fd;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border: 1px solid rgba(167, 139, 250, 0.2);
        }

        .level-title {
            color: #e8e0ff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .level-desc {
            color: #9ca3c0;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Match Cards Grid */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .card {
            background: rgba(40, 30, 80, 0.7);
            border: 2px solid rgba(120, 100, 200, 0.3);
            border-radius: 14px;
            padding: 14px 8px;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #d4d0f0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 0 rgba(20, 15, 50, 0.8);
            user-select: none;
            line-height: 1.3;
            word-break: break-word;
        }

        .card:hover:not(.matched):not(.disabled) {
            transform: translateY(-2px);
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 6px 12px rgba(100, 80, 200, 0.2);
        }

        .card.selected {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.12);
            box-shadow: 0 0 16px rgba(251, 191, 36, 0.2);
        }

        .card.matched {
            background: rgba(52, 211, 153, 0.1);
            border-color: rgba(52, 211, 153, 0.4);
            opacity: 0.45;
            cursor: default;
            transform: scale(0.95);
        }

        .card.wrong {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.15);
            animation: shake 0.35s ease;
        }

        .card.disabled {
            pointer-events: none;
        }

        /* Choice Buttons */
        .option-btn {
            display: block;
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 10px;
            background: rgba(40, 30, 80, 0.6);
            border: 2px solid rgba(120, 100, 200, 0.3);
            border-radius: 16px;
            color: #d4d0f0;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: left;
        }

        .option-btn:hover:not(.disabled) {
            border-color: rgba(167, 139, 250, 0.5);
            background: rgba(60, 45, 120, 0.5);
            transform: translateX(4px);
        }

        .option-btn.correct {
            border-color: #34d399;
            background: rgba(52, 211, 153, 0.15);
            box-shadow: 0 0 12px rgba(52, 211, 153, 0.2);
        }

        .option-btn.wrong {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.15);
            animation: shake 0.35s ease;
        }

        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        /* Drag and Drop */
        .drag-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 14px 0;
        }

        .drag-item {
            background: rgba(50, 35, 110, 0.7);
            border: 2px solid rgba(140, 110, 220, 0.4);
            border-radius: 40px;
            padding: 10px 24px;
            color: #e0d8ff;
            font-size: 15px;
            cursor: grab;
            user-select: none;
            transition: all 0.15s ease;
        }

        .drag-item:active {
            cursor: grabbing;
        }

        .drag-item.dragging {
            opacity: 0.35;
        }

        .drag-item.placed {
            display: none;
        }

        .drop-zone {
            background: rgba(15, 10, 40, 0.5);
            border: 2px dashed rgba(140, 110, 220, 0.3);
            border-radius: 16px;
            padding: 14px 16px;
            text-align: center;
            color: #7c7aaa;
            font-size: 14px;
            transition: all 0.2s ease;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drop-zone.drag-over {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.06);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.15);
        }

        .drop-zone.filled {
            border-color: #34d399;
            background: rgba(52, 211, 153, 0.08);
            color: #a7f3d0;
            border-style: solid;
        }

        .drop-zone.wrong-flash {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            animation: flash-red 0.5s ease;
        }

        .drop-zones-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn:active {
            transform: translateY(2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #8b5cf6, #c084fc);
        }

        .btn-primary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(60, 50, 100, 0.6);
            color: #c4b5fd;
            border: 1px solid rgba(120, 100, 200, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(80, 65, 140, 0.6);
        }

        /* Feedback */
        .feedback {
            margin-top: 16px;
            padding: 12px 18px;
            border-radius: 16px;
            background: rgba(20, 15, 50, 0.7);
            color: #b8b0d8;
            font-size: 15px;
            min-height: 48px;
            border-left: 4px solid rgba(167, 139, 250, 0.4);
            display: flex;
            align-items: center;
        }

        /* Victory Overlay */
        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 3, 20, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .victory-overlay.show {
            display: flex;
        }

        .victory-card {
            background: linear-gradient(145deg, #1a1050, #0f0a30);
            padding: 44px 36px;
            border-radius: 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 2px solid rgba(167, 139, 250, 0.3);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 60px rgba(124, 58, 237, 0.15);
            animation: pop-in 0.4s ease;
        }

        .victory-card h2 {
            font-size: 38px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #fcd34d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .victory-card p {
            color: #c4b5fd;
            font-size: 17px;
            margin: 12px 0 24px;
            line-height: 1.7;
        }

        .victory-card .score-display {
            font-size: 48px;
            font-weight: 800;
            color: #fbbf24;
            margin: 8px 0;
        }

        /* Game Over */
        .gameover-text {
            color: #f87171;
            font-size: 16px;
            margin-top: 10px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @keyframes flash-red {
            0% { border-color: #f87171; background: rgba(248, 113, 113, 0.15); }
            100% { border-color: rgba(140, 110, 220, 0.3); background: rgba(15, 10, 40, 0.5); }
        }

        @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(167, 139, 250, 0.3); }
            50% { box-shadow: 0 0 20px rgba(167, 139, 250, 0.6); }
        }

        /* Responsive */
        @media (max-width: 550px) {
            body {
                padding: 10px;
            }

            .game-container {
                padding: 16px 12px 24px;
                border-radius: 24px;
            }

            .top-bar h1 {
                font-size: 17px;
            }

            .top-stats {
                font-size: 12px;
                gap: 8px;
                padding: 5px 12px;
            }

            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .card {
                font-size: 13px;
                min-height: 60px;
                padding: 10px 6px;
            }

            .play-area {
                padding: 18px 14px 22px;
                min-height: 350px;
            }

            .drop-zones-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .drag-item {
                font-size: 14px;
                padding: 8px 18px;
            }

            .option-btn {
                font-size: 15px;
                padding: 12px 16px;
            }

            .victory-card {
                padding: 32px 24px;
            }

            .victory-card h2 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <h1>🌐 光纤三关</h1>
            <div class="top-stats">
                <div class="score">🏆 <span id="scoreDisplay">0</span></div>
                <div class="lives">❤️ <span id="livesDisplay">3</span></div>
                <div class="level-info">📌 <span id="levelDisplay">1</span>/3</div>
            </div>
        </div>

        <div class="level-progress" id="progressDots"></div>

        <div class="play-area" id="playArea"></div>
    </div>

    <div class="victory-overlay" id="victoryOverlay">
        <div class="victory-card">
            <h2>🎉 通关成功！</h2>
            <p>你已掌握光纤通信核心知识！</p>
            <div class="score-display" id="finalScore">0</div>
            <p>🌟 光纤小达人！</p>
            <button class="btn btn-primary" id="restartFullBtn" style="margin-top:12px;">🔄 重新挑战</button>
        </div>
    </div>

    <script>
        // ==================== Game Data ====================
        const LEVELS = [
            {
                mode: 'match',
                title: '🔗 连连看 · 术语配对',
                desc: '点击两张卡片进行配对，找到术语与解释的正确组合',
                pairs: [
                    { term: '全反射', def: '光从光密到光疏，入射角>临界角' },
                    { term: '单模光纤', def: '纤芯细，只传基模，长距离' },
                    { term: 'EDFA', def: '掺铒光纤放大器，1550nm' },
                    { term: 'WDM', def: '波分复用，多波长同纤传输' }
                ]
            },
            {
                mode: 'choice',
                title: '📝 选择题 · 光纤原理',
                desc: '选出正确答案',
                question: '光纤通信中，光信号在纤芯中传输的核心原理是？',
                options: ['光的折射', '光的全反射', '光的衍射', '光的干涉'],
                answer: 1
            },
            {
                mode: 'drag',
                title: '🧩 拖拽匹配 · 结构对应',
                desc: '将术语拖拽到对应的解释框中完成匹配',
                items: [
                    { term: '纤芯', def: '折射率最高，光传输核心' },
                    { term: '包层', def: '折射率较低，束缚光信号' },
                    { term: '涂覆层', def: '保护光纤，增强机械强度' }
                ]
            }
        ];

        // ==================== Game State ====================
        let currentLevel = 0;
        let score = 0;
        let lives = 3;
        let isProcessing = false;
        let levelState = null;
        const totalLevels = LEVELS.length;

        // ==================== DOM References ====================
        const playArea = document.getElementById('playArea');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const progressDots = document.getElementById('progressDots');
        const victoryOverlay = document.getElementById('victoryOverlay');
        const finalScore = document.getElementById('finalScore');
        const restartFullBtn = document.getElementById('restartFullBtn');

        // ==================== Utility Functions ====================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function setFeedback(msg) {
            const fb = document.getElementById('feedback');
            if (fb) fb.textContent = msg;
        }

        function updateStats() {
            scoreDisplay.textContent = score;
            livesDisplay.textContent = lives;
        }

        function gameOver() {
            setFeedback('💔 生命值为0，游戏结束！点击"重玩本关"继续');
            document.querySelectorAll('.btn-primary').forEach(b => b.disabled = true);
        }

        function renderProgress() {
            let html = '';
            for (let i = 0; i < totalLevels; i++) {
                let cls = 'level-dot';
                if (i < currentLevel) cls += ' done';
                else if (i === currentLevel) cls += ' active';
                else cls += ' locked';
                html += `<div class="${cls}"></div>`;
            }
            progressDots.innerHTML = html;
        }

        // ==================== Navigation ====================
        function goNextLevel() {
            if (currentLevel < totalLevels - 1) {
                currentLevel++;
                renderLevel();
            } else {
                finalScore.textContent = score + '分';
                victoryOverlay.classList.add('show');
            }
        }

        function resetCurrentLevel() {
            if (lives <= 0) lives = 3;
            updateStats();
            renderLevel();
        }

        function restartFull() {
            currentLevel = 0;
            score = 0;
            lives = 3;
            victoryOverlay.classList.remove('show');
            updateStats();
            renderLevel();
        }

        restartFullBtn.addEventListener('click', restartFull);

        // ==================== Main Render ====================
        function renderLevel() {
            const lv = LEVELS[currentLevel];
            levelDisplay.textContent = currentLevel + 1;
            renderProgress();
            updateStats();

            switch (lv.mode) {
                case 'match': renderMatch(lv); break;
                case 'choice': renderChoice(lv); break;
                case 'drag': renderDrag(lv); break;
            }
        }

        // ==================== Level 1: Match Cards ====================
        function renderMatch(lv) {
            const pairs = lv.pairs;
            let cards = [];

            pairs.forEach((p, idx) => {
                cards.push({ pairId: idx, type: 'term', text: p.term, matched: false });
                cards.push({ pairId: idx, type: 'def', text: p.def, matched: false });
            });

            shuffleArray(cards);

            levelState = {
                cards: cards,
                selected: null,
                matchedCount: 0,
                totalPairs: pairs.length
            };

            let html = `
                <div class="mode-badge">🔗 连连看</div>
                <div class="level-title">${lv.title}</div>
                <div class="level-desc">${lv.desc}</div>
                <div class="grid-4" id="matchGrid">
            `;

            cards.forEach((c, idx) => {
                html += `<div class="card" data-idx="${idx}">${c.text}</div>`;
            });

            html += `</div>
                <div class="feedback" id="feedback">💡 点击术语，再点击对应的解释配对</div>
                <div class="btn-row">
                    <button class="btn btn-secondary" onclick="resetCurrentLevel()">🔄 重玩本关</button>
                    <button class="btn btn-primary" id="nextBtn" disabled>下一关 →</button>
                </div>
            `;

            playArea.innerHTML = html;

            document.querySelectorAll('#matchGrid .card').forEach(el => {
                el.addEventListener('click', matchClickHandler);
            });
            document.getElementById('nextBtn').addEventListener('click', goNextLevel);
        }

        function matchClickHandler(e) {
            if (isProcessing) return;

            const el = e.currentTarget;
            const idx = parseInt(el.dataset.idx);
            const state = levelState;
            const cards = state.cards;
            const card = cards[idx];

            if (card.matched) return;

            // Deselect if same card clicked
            if (state.selected === idx) {
                el.classList.remove('selected');
                state.selected = null;
                setFeedback('💡 已取消选择');
                return;
            }

            // First selection
            if (state.selected === null) {
                el.classList.add('selected');
                state.selected = idx;
                setFeedback(`🔍 已选: "${card.text}"，配对其${card.type === 'term' ? '解释' : '术语'}`);
                return;
            }

            const firstIdx = state.selected;
            const firstCard = cards[firstIdx];
            const firstEl = document.querySelector(`#matchGrid .card[data-idx="${firstIdx}"]`);
            const secondCard = card;

            // Same type - switch selection
            if (firstCard.type === secondCard.type) {
                firstEl.classList.remove('selected');
                el.classList.add('selected');
                state.selected = idx;
                setFeedback(`🔍 已选: "${card.text}"，配对其${card.type === 'term' ? '解释' : '术语'}`);
                return;
            }

            // Check match
            const isMatch = (firstCard.pairId === secondCard.pairId);

            if (isMatch) {
                firstCard.matched = true;
                secondCard.matched = true;
                firstEl.classList.remove('selected');
                firstEl.classList.add('matched');
                el.classList.add('matched');
                state.matchedCount++;
                state.selected = null;
                score += 5;
                updateStats();
                setFeedback(`✅ 配对成功！"${firstCard.text}" ⇔ "${secondCard.text}"`);

                if (state.matchedCount === state.totalPairs) {
                    setFeedback('🎉 本关完成！点击"下一关"继续');
                    document.getElementById('nextBtn').disabled = false;
                }
            } else {
                isProcessing = true;
                firstEl.classList.add('wrong');
                el.classList.add('wrong');
                lives--;
                updateStats();
                setFeedback('❌ 配对错误，再试一次');

                if (lives <= 0) {
                    gameOver();
                    return;
                }

                setTimeout(() => {
                    firstEl.classList.remove('wrong', 'selected');
                    el.classList.remove('wrong');
                    state.selected = null;
                    isProcessing = false;
                    setFeedback('💡 重新尝试配对');
                }, 700);
            }
        }

        // ==================== Level 2: Multiple Choice ====================
        function renderChoice(lv) {
            levelState = { answered: false };

            let html = `
                <div class="mode-badge">📝 选择题</div>
                <div class="level-title">${lv.title}</div>
                <div class="level-desc">${lv.desc}</div>
                <div style="color:#e8e0ff;font-size:18px;margin-bottom:18px;line-height:1.5;">${lv.question}</div>
            `;

            lv.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx);
                html += `<button class="option-btn" data-idx="${idx}">${letter}. ${opt}</button>`;
            });

            html += `
                <div class="feedback" id="feedback">💡 选择一个选项</div>
                <div class="btn-row">
                    <button class="btn btn-secondary" onclick="resetCurrentLevel()">🔄 重玩本关</button>
                    <button class="btn btn-primary" id="nextBtn" disabled>下一关 →</button>
                </div>
            `;

            playArea.innerHTML = html;

            document.querySelectorAll('.option-btn').forEach(el => {
                el.addEventListener('click', choiceClickHandler);
            });
            document.getElementById('nextBtn').addEventListener('click', goNextLevel);
        }

        function choiceClickHandler(e) {
            if (isProcessing || levelState.answered) return;

            const el = e.currentTarget;
            const idx = parseInt(el.dataset.idx);
            const lv = LEVELS[currentLevel];
            const correct = idx === lv.answer;

            isProcessing = true;
            levelState.answered = true;

            document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

            if (correct) {
                el.classList.add('correct');
                score += 10;
                setFeedback('✅ 回答正确！光的全反射是光纤通信的核心原理');
            } else {
                el.classList.add('wrong');
                document.querySelectorAll('.option-btn')[lv.answer].classList.add('correct');
                lives--;
                setFeedback(`❌ 错误。正确答案是 ${String.fromCharCode(65 + lv.answer)}. ${lv.options[lv.answer]}`);

                if (lives <= 0) {
                    gameOver();
                    return;
                }
            }

            updateStats();
            document.getElementById('nextBtn').disabled = false;
            isProcessing = false;
        }

        // ==================== Level 3: Drag and Drop ====================
        let dragData = null;

        function renderDrag(lv) {
            const items = lv.items;
            const shuffledTerms = items.map(i => i.term);
            shuffleArray(shuffledTerms);

            levelState = {
                items: items,
                shuffledTerms: shuffledTerms,
                placed: items.map(() => null),
                completed: 0
            };

            let html = `
                <div class="mode-badge">🧩 拖拽匹配</div>
                <div class="level-title">${lv.title}</div>
                <div class="level-desc">${lv.desc}</div>
                <div style="color:#9ca3c0;font-size:13px;margin-bottom:12px;">👆 拖拽上方术语到下方对应的解释框中（手机端可长按拖拽）</div>
                <div class="drag-area" id="dragItems">
            `;

            shuffledTerms.forEach((term, idx) => {
                html += `<div class="drag-item" draggable="true" data-idx="${idx}">${term}</div>`;
            });

            html += `</div><div class="drop-zones-grid" id="dropZones">`;

            items.forEach((item, idx) => {
                html += `<div class="drop-zone" data-idx="${idx}">📥 ${item.def}</div>`;
            });

            html += `</div>
                <div class="feedback" id="feedback">💡 拖拽术语到对应的解释框</div>
                <div class="btn-row">
                    <button class="btn btn-secondary" onclick="resetCurrentLevel()">🔄 重玩本关</button>
                    <button class="btn btn-primary" id="nextBtn" disabled>🎉 完成</button>
                </div>
            `;

            playArea.innerHTML = html;

            // Desktop drag events
            document.querySelectorAll('.drag-item').forEach(el => {
                el.addEventListener('dragstart', dragStart);
                el.addEventListener('dragend', dragEnd);
            });

            document.querySelectorAll('.drop-zone').forEach(el => {
                el.addEventListener('dragover', dragOver);
                el.addEventListener('dragleave', dragLeave);
                el.addEventListener('drop', dropHandler);
            });

            // Touch events for mobile
            setupTouchDrag();

            document.getElementById('nextBtn').addEventListener('click', goNextLevel);
        }

        function dragStart(e) {
            dragData = parseInt(e.target.dataset.idx);
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function dragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function dragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.classList.add('drag-over');
        }

        function dragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function dropHandler(e) {
            e.preventDefault();
            const zone = e.currentTarget;
            zone.classList.remove('drag-over');
            handleDrop(zone);
        }

        function handleDrop(zone) {
            const zoneIdx = parseInt(zone.dataset.idx);
            const state = levelState;

            if (state.placed[zoneIdx] !== null) return;
            if (dragData === null) return;

            const termIdx = dragData;
            const term = state.shuffledTerms[termIdx];
            const correctTerm = state.items[zoneIdx].term;

            if (term === correctTerm) {
                state.placed[zoneIdx] = term;
                state.completed++;
                zone.textContent = `✅ ${term}`;
                zone.classList.add('filled');

                const dragEl = document.querySelector(`.drag-item[data-idx="${termIdx}"]`);
                if (dragEl) {
                    dragEl.classList.add('placed');
                    dragEl.style.display = 'none';
                }

                score += 5;
                updateStats();
                setFeedback(`✅ 匹配成功！"${term}" ⇔ "${state.items[zoneIdx].def}"`);

                if (state.completed === state.items.length) {
                    setFeedback('🎉 本关完成！恭喜通关！');
                    document.getElementById('nextBtn').disabled = false;
                }
            } else {
                lives--;
                updateStats();
                setFeedback(`❌ 匹配错误，"${term}" 不匹配该解释`);
                zone.classList.add('wrong-flash');
                setTimeout(() => zone.classList.remove('wrong-flash'), 600);

                if (lives <= 0) {
                    gameOver();
                }
            }

            dragData = null;
        }

        // ==================== Touch Drag Support (Mobile) ====================
        function setupTouchDrag() {
            let touchDragEl = null;
            let touchClone = null;

            document.querySelectorAll('.drag-item').forEach(el => {
                el.addEventListener('touchstart', function(e) {
                    if (this.classList.contains('placed')) return;
                    touchDragEl = this;
                    dragData = parseInt(this.dataset.idx);
                    this.classList.add('dragging');

                    // Create visual clone
                    touchClone = this.cloneNode(true);
                    touchClone.style.position = 'fixed';
                    touchClone.style.zIndex = '1000';
                    touchClone.style.pointerEvents = 'none';
                    touchClone.style.opacity = '0.85';
                    touchClone.style.transform = 'scale(1.05)';
                    document.body.appendChild(touchClone);

                    const touch = e.touches[0];
                    touchClone.style.left = (touch.clientX - 40) + 'px';
                    touchClone.style.top = (touch.clientY - 20) + 'px';
                }, { passive: true });

                el.addEventListener('touchmove', function(e) {
                    if (!touchClone) return;
                    e.preventDefault();
                    const touch = e.touches[0];
                    touchClone.style.left = (touch.clientX - 40) + 'px';
                    touchClone.style.top = (touch.clientY - 20) + 'px';

                    // Highlight drop zone under finger
                    document.querySelectorAll('.drop-zone').forEach(zone => {
                        const rect = zone.getBoundingClientRect();
                        if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                            touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                            zone.classList.add('drag-over');
                        } else {
                            zone.classList.remove('drag-over');
                        }
                    });
                }, { passive: false });

                el.addEventListener('touchend', function(e) {
                    if (!touchDragEl) return;
                    this.classList.remove('dragging');

                    if (touchClone) {
                        touchClone.remove();
                        touchClone = null;
                    }

                    const touch = e.changedTouches[0];
                    let dropped = false;

                    document.querySelectorAll('.drop-zone').forEach(zone => {
                        zone.classList.remove('drag-over');
                        const rect = zone.getBoundingClientRect();
                        if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                            touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                            handleDrop(zone);
                            dropped = true;
                        }
                    });

                    touchDragEl = null;
                    if (!dropped) dragData = null;
                }, { passive: true });
            });
        }

        // ==================== Initialize Game ====================
        renderLevel();
    </script>
</body>
</html>
